name: Build Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Gradle 9.3.1
        run: |
          wget -q https://services.gradle.org/distributions/gradle-9.3.1-bin.zip -O gradle.zip
          unzip -q gradle.zip

      - name: Build
        run: gradle-9.3.1/bin/gradle build

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: fakelag-mod
          path: build/libs/*-1.0.0.jar
          if-no-files-found: error
